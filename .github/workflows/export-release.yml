name: Export Godot Builds

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: export-release-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.5-stable
      GODOT_VERSION_DIR: 4.5.stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot editor and export templates
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}"

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION_DIR}_linux.x86_64.zip" -O godot.zip
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION_DIR}_export_templates.tpz" -O templates.tpz

          unzip -q godot.zip -d godot
          unzip -q templates.tpz -d templates

          cp -r templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}/"

          chmod +x godot/Godot_v${GODOT_VERSION}_linux.x86_64

      - name: Export Windows and Linux executables
        run: |
          set -euo pipefail
          mkdir -p build

          godot/Godot_v${GODOT_VERSION}_linux.x86_64 --headless --path . --export-release "Windows Desktop" "build/Gratishoot.exe"
          godot/Godot_v${GODOT_VERSION}_linux.x86_64 --headless --path . --export-release "Linux" "build/Gratishoot.x86_64"

          chmod +x build/Gratishoot.x86_64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Gratishoot.exe
            build/Gratishoot.x86_64
          fail_on_unmatched_files: true
          overwrite_files: true
